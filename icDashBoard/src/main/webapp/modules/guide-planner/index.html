        function renderDropdown(anchorEl, items, ddId) {
            closeDropdowns();
            const rect = anchorEl.getBoundingClientRect();
            const dd = document.createElement('div');
            dd.className = 'gp-dropdown';
            dd.id = 'active-dropdown';
            dd.dataset.ddId = ddId;

            const spaceBelow = window.innerHeight - rect.bottom;
            const top = spaceBelow > 200 ? rect.bottom + 4 : rect.top - 4;
            const placeAbove = spaceBelow <= 200;
            dd.style.left = rect.left + 'px';
            dd.style.top = placeAbove ? 'auto' : (rect.bottom + 4) + 'px';
            if (placeAbove) dd.style.bottom = (window.innerHeight - rect.top + 4) + 'px';

            dd.innerHTML = items;
            document.body.appendChild(dd);
        }

        function closeDropdowns() {
            const dd = document.getElementById('active-dropdown');
            if (dd) dd.remove();
            openDD = null;
        }

        // ================================================================
        //  EVENT HANDLING
        // ================================================================
        function setupEvents() {
            const app = document.getElementById('app');

            // ── Click delegation ──
            app.addEventListener('click', (e) => {
                const btn = e.target.closest('[data-action]');
                if (!btn) {
                    // Click on editable to start edit
                    const editable = e.target.closest('.gp-editable[data-action="start-edit"]');
                    if (editable) {
                        editing = { taskId: parseInt(editable.dataset.tid, 10), field: editable.dataset.field };
                        render();
                        return;
                    }
                    return;
                }
                const action = btn.dataset.action;
                const tid = btn.dataset.tid != null ? parseInt(btn.dataset.tid, 10) : undefined;
                const gid = btn.dataset.gid;
                const pid = btn.dataset.pid != null ? parseInt(btn.dataset.pid, 10) : undefined;

                switch (action) {
                    case 'scroll-add':
                        addFormOpen = true;
                        render();
                        const af = document.getElementById('add-form') || document.querySelector('.gp-add-toggle');
                        if (af) af.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        break;
                    case 'open-import':
                        dispatch({ type: 'SET_IMPORT_MODAL', payload: true });
                        break;
                    case 'export-csv': {
                        const tasks = getFilteredTasks();
                        downloadCSV(tasks, 'guide-tasks.csv');
                        showToast(`Exporterade ${tasks.length} uppgifter`, 'success');
                        break;
                    }
                    case 'open-settings':
                        dispatch({ type: 'SET_SETTINGS_MODAL', payload: true });
                        break;
                    case 'clear-all':
                        confirmAction = { msg: 'Vill du verkligen rensa alla uppgifter i detta projekt?', fn: () => dispatch({ type: 'CLEAR_ALL_DATA' }) };
                        render();
                        break;
                    case 'switch-tab':
                        if (pid !== state.activeProjectId) dispatch({ type: 'SWITCH_PROJECT', payload: pid });
                        break;
                    case 'rename-tab':
                        e.stopPropagation();
                        renamingTab = pid;
                        render();
                        break;
                    case 'delete-tab':
                        e.stopPropagation();
                        confirmAction = { msg: `Ta bort projektet "${state.projects.find(p=>p.id===pid)?.name}"?`, fn: () => { dispatch({ type: 'DELETE_PROJECT', payload: pid }); showToast('Projekt borttaget', 'success'); } };
                        render();
                        break;
                    case 'start-add-tab':
                        addingTab = true;
                        render();
                        break;
                    case 'toggle-group':
                        dispatch({ type: 'TOGGLE_EXPAND', payload: gid });
                        break;
                    case 'delete-group':
                        e.stopPropagation();
                        confirmAction = { msg: `Ta bort alla uppgifter i gruppen "${gid}"?`, fn: () => {
                            const ids = getTasks().filter(t => t.guideId === gid).map(t => t.id);
                            dispatch({ type: 'DELETE_TASKS', payload: ids });
                            showToast(`Grupp ${gid} borttagen`, 'success');
                        }};
                        render();
                        break;
                    case 'toggle-select':
                        dispatch({ type: 'TOGGLE_SELECTION', payload: tid });
                        break;
                    case 'select-all-group': {
                        const group = getTasks().filter(t => t.guideId === gid);
                        const allSel = group.every(t => state._ui.selectedIds.has(t.id));
                        if (allSel) group.forEach(t => state._ui.selectedIds.delete(t.id));
                        else group.forEach(t => state._ui.selectedIds.add(t.id));
                        render();
                        break;
                    }
                    case 'edit-ids':
                        editingIds = tid;
                        render();
                        break;
                    case 'toggle-dd': {
                        const ddType = btn.dataset.dd;
                        if (openDD && openDD.type === ddType && openDD.taskId === tid) { closeDropdowns(); return; }
                        openDD = { type: ddType, taskId: tid };
                        handleDropdownOpen(btn, ddType, tid);
                        break;
                    }
                    case 'reset-filters':
                        dispatch({ type: 'RESET_FILTERS' });
                        break;
                    case 'clear-search':
                        dispatch({ type: 'SET_FILTER', payload: { search: '' } });
                        break;
                    case 'expand-all': {
                        const gids = getGroupedTasks(getFilteredTasks()).map(g => g.guideId);
                        dispatch({ type: 'EXPAND_ALL', payload: gids });
                        break;
                    }
                    case 'collapse-all':
                        dispatch({ type: 'COLLAPSE_ALL' });
                        break;
                    case 'clear-selection':
                        dispatch({ type: 'CLEAR_SELECTION' });
                        break;
                    case 'bulk-delete':
                        confirmAction = { msg: `Ta bort ${state._ui.selectedIds.size} markerade uppgifter?`, fn: () => {
                            dispatch({ type: 'DELETE_TASKS', payload: [...state._ui.selectedIds] });
                            showToast('Uppgifter borttagna', 'success');
                        }};
                        render();
                        break;
                    case 'toggle-add-form':
                        addFormOpen = !addFormOpen;
                        render();
                        break;
                    case 'submit-add-form':
                        handleAddFormSubmit();
                        break;
                    case 'add-step':
                        handleAddStep(gid);
                        break;
                    // Filter chip removal
                    case 'remove-status-filter': {
                        const val = btn.dataset.val;
                        dispatch({ type: 'SET_FILTER', payload: { statuses: state._ui.filters.statuses.filter(s => s !== val) } });
                        break;
                    }
                    case 'remove-assignee-filter': {
                        const val = btn.dataset.val;
                        dispatch({ type: 'SET_FILTER', payload: { assignees: state._ui.filters.assignees.filter(a => a !== val) } });
                        break;
                    }
                }
            });

            // ── Change events (selects) ──
            app.addEventListener('change', (e) => {
                if (e.target.dataset.action === 'bulk-status' && e.target.value) {
                    dispatch({ type: 'BULK_UPDATE_STATUS', payload: { ids: [...state._ui.selectedIds], status: e.target.value } });
                    showToast('Status uppdaterad', 'success');
                }
            });

            // ── Input events (search, etc.) ──
            app.addEventListener('input', (e) => {
                if (e.target.dataset.action === 'search-input') {
                    dispatch({ type: 'SET_FILTER', payload: { search: e.target.value } });
                }
            });

            // ── Keydown for inline editing ──
            app.addEventListener('keydown', (e) => {
                const el = e.target;
                // Inline edit save/cancel
                if (el.dataset.editTask) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        saveInlineEdit(el);
                    } else if (e.key === 'Escape') {
                        editing = null;
                        editingIds = null;
                        render();
                    } else if (e.key === 'Tab' && editingIds) {
                        // Tab through ID fields
                        const fields = ['svId', 'enId', 'noId'];
                        const idx = fields.indexOf(el.dataset.editField);
                        if (idx >= 0 && idx < fields.length - 1) {
                            e.preventDefault();
                            saveInlineEdit(el, true);
                            const next = document.querySelector(`[data-edit-task="${el.dataset.editTask}"][data-edit-field="${fields[idx+1]}"]`);
                            if (next) next.focus();
                        } else if (idx === fields.length - 1) {
                            saveInlineEdit(el);
                            editingIds = null;
                            render();
                        }
                    }
                }
                // Tab rename input
                if (el.dataset.action === 'rename-tab-input' && e.key === 'Enter') {
                    const name = el.value.trim();
                    if (name) dispatch({ type: 'RENAME_PROJECT', payload: { id: parseInt(el.dataset.pid, 10), name } });
                    renamingTab = null;
                    render();
                }
                if (el.dataset.action === 'rename-tab-input' && e.key === 'Escape') {
                    renamingTab = null;
                    render();
                }
                // Add tab input
                if (el.dataset.action === 'add-tab-input' && e.key === 'Enter') {
                    const name = el.value.trim();
                    if (name) { dispatch({ type: 'ADD_PROJECT', payload: name }); showToast(`Projekt "${name}" skapat`, 'success'); }
                    addingTab = false;
                    render();
                }
                if (el.dataset.action === 'add-tab-input' && e.key === 'Escape') {
                    addingTab = false;
                    render();
                }
                // Bulk assignee
                if (el.dataset.action === 'bulk-assignee-input' && e.key === 'Enter') {
                    const name = el.value.trim();
                    if (name) {
                        dispatch({ type: 'BULK_UPDATE_ASSIGNEE', payload: { ids: [...state._ui.selectedIds], assignee: name } });
                        showToast(`Tilldelad ${name}`, 'success');
                    }
                }
                // Settings: add assignee
                if (el.id === 'new-assignee-input' && e.key === 'Enter') {
                    const name = el.value.trim();
                    if (name && !getAssignees().includes(name)) {
                        dispatch({ type: 'SET_ASSIGNEES', payload: [...getAssignees(), name].sort() });
                        el.value = '';
                        showToast(`${name} tillagd`, 'success');
                    }
                }
                // Import mode radio
                if (el.name === 'imp-mode') importMode = el.value;
            });

            // ── Blur for inline editing ──
            app.addEventListener('focusout', (e) => {
                const el = e.target;
                if (el.dataset.editTask && !el.dataset.editField?.match(/^(svId|enId|noId)$/ ) || (el.dataset.editTask && !editingIds)) {
                    if (el.dataset.editTask) {
                        setTimeout(() => {
                            // Check if focus moved to another edit field of the same task (for ID group)
                            const active = document.activeElement;
                            if (active && active.dataset && active.dataset.editTask === el.dataset.editTask) return;
                            saveInlineEdit(el);
                            editing = null;
                            editingIds = null;
                            render();
                        }, 100);
                    }
                }
            });

            // ── Drag and drop ──
            let dragData = null;
            app.addEventListener('dragstart', (e) => {
                const row = e.target.closest('tr[data-tid]');
                if (!row) return;
                dragData = { taskId: parseInt(row.dataset.tid, 10), guideId: row.dataset.gid, idx: parseInt(row.dataset.idx, 10) };
                row.classList.add('dragging');
                e.dataTransfer.effectAllowed = 'move';
                e.dataTransfer.setData('text/plain', row.dataset.tid);
            });
            app.addEventListener('dragover', (e) => {
                const row = e.target.closest('tr[data-tid]');
                if (!row || !dragData || row.dataset.gid !== dragData.guideId) return;
                e.preventDefault();
                e.dataTransfer.dropEffect = 'move';
                const rect = row.getBoundingClientRect();
                const mid = rect.top + rect.height / 2;
                row.style.borderTop = e.clientY < mid ? '2px solid var(--ic-primary)' : '';
                row.style.borderBottom = e.clientY >= mid ? '2px solid var(--ic-primary)' : '';
            });
            app.addEventListener('dragleave', (e) => {
                const row = e.target.closest('tr[data-tid]');
                if (row) { row.style.borderTop = ''; row.style.borderBottom = ''; }
            });
            app.addEventListener('drop', (e) => {
                e.preventDefault();
                const row = e.target.closest('tr[data-tid]');
                if (!row || !dragData || row.dataset.gid !== dragData.guideId) return;
                row.style.borderTop = ''; row.style.borderBottom = '';
                const newIdx = parseInt(row.dataset.idx, 10);
                if (newIdx !== dragData.idx) {
                    dispatch({ type: 'REORDER_TASK', payload: { taskId: dragData.taskId, newIndex: newIdx, guideId: dragData.guideId } });
                }
                dragData = null;
            });
            app.addEventListener('dragend', () => {
                document.querySelectorAll('tr.dragging').forEach(r => r.classList.remove('dragging'));
                document.querySelectorAll('tr[data-tid]').forEach(r => { r.style.borderTop = ''; r.style.borderBottom = ''; });
                dragData = null;
            });

            // ── Global: click outside to close dropdowns/modals ──
            document.addEventListener('click', (e) => {
                // Close dropdowns
                const dd = document.getElementById('active-dropdown');
                if (dd && !dd.contains(e.target) && !e.target.closest('[data-action="toggle-dd"]')) {
                    closeDropdowns();
                }
                // Close modals — ×-button or clicking the overlay background (not the modal content)
                if (e.target.closest('[data-action="close-import"]') || (e.target.dataset.action === 'close-modal' && e.target.dataset.modal === 'import')) {
                    cleanupModal('import-modal-wrap');
                    dispatch({ type: 'SET_IMPORT_MODAL', payload: false });
                }
                if (e.target.closest('[data-action="close-settings"]') || (e.target.dataset.action === 'close-modal' && e.target.dataset.modal === 'settings')) {
                    cleanupModal('settings-modal-wrap');
                    dispatch({ type: 'SET_SETTINGS_MODAL', payload: false });
                }
                // Close confirm modal when clicking overlay background
                if (e.target.dataset.action === 'close-confirm') {
                    confirmAction = null;
                    cleanupModal('confirm-modal-wrap');
                    render();
                }
                // Import actions
                if (e.target.closest('[data-action="clipboard-import"]')) handleClipboardImport();
                if (e.target.closest('[data-action="file-import-zone"]')) document.getElementById('file-input')?.click();
                if (e.target.closest('[data-action="import-back"]')) { importPreview = null; renderRefreshModal('import'); }
                if (e.target.closest('[data-action="do-import"]')) handleDoImport();
                // Settings actions
                if (e.target.closest('[data-action="add-assignee"]')) {
                    const inp = document.getElementById('new-assignee-input');
                    if (inp && inp.value.trim() && !getAssignees().includes(inp.value.trim())) {
                        dispatch({ type: 'SET_ASSIGNEES', payload: [...getAssignees(), inp.value.trim()].sort() });
                        showToast(`${inp.value.trim()} tillagd`, 'success');
                    }
                }
                if (e.target.closest('[data-action="remove-assignee"]')) {
                    const name = e.target.closest('[data-action="remove-assignee"]').dataset.name;
                    dispatch({ type: 'SET_ASSIGNEES', payload: getAssignees().filter(a => a !== name) });
                }
                // Confirm modal
                if (e.target.closest('[data-action="confirm-ok"]') && confirmAction) {
                    const fn = confirmAction.fn;
                    confirmAction = null;
                    cleanupModal('confirm-modal-wrap');
                    fn();
                }
                if (e.target.closest('[data-action="confirm-cancel"]')) {
                    confirmAction = null;
                    cleanupModal('confirm-modal-wrap');
                    render();
                }
                // Dropdown items
                if (e.target.closest('.gp-dropdown-item')) handleDropdownSelect(e.target.closest('.gp-dropdown-item'));
            });

            // Escape key global
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    if (document.getElementById('active-dropdown')) { closeDropdowns(); return; }
                    if (confirmAction) { confirmAction = null; cleanupModal('confirm-modal-wrap'); render(); return; }
                    if (state._ui.importModalOpen) { cleanupModal('import-modal-wrap'); dispatch({ type: 'SET_IMPORT_MODAL', payload: false }); return; }
                    if (state._ui.settingsModalOpen) { cleanupModal('settings-modal-wrap'); dispatch({ type: 'SET_SETTINGS_MODAL', payload: false }); return; }
                }
            });

            // File input change
            document.addEventListener('change', (e) => {
                if (e.target.id === 'file-input' && e.target.files[0]) handleFileImport(e.target.files[0]);
                if (e.target.name === 'imp-mode') importMode = e.target.value;
            });

            // File drag-drop on zone
            document.addEventListener('dragover', (e) => {
                const zone = document.getElementById('file-drop-zone');
                if (zone && zone.contains(e.target)) { e.preventDefault(); zone.classList.add('dragover'); }
            });
            document.addEventListener('dragleave', (e) => {
                const zone = document.getElementById('file-drop-zone');
                if (zone && !zone.contains(e.relatedTarget)) zone.classList.remove('dragover');
            });
            document.addEventListener('drop', (e) => {
                const zone = document.getElementById('file-drop-zone');
                if (zone && zone.contains(e.target)) {
                    e.preventDefault(); zone.classList.remove('dragover');
                    if (e.dataTransfer.files[0]) handleFileImport(e.dataTransfer.files[0]);
                }
            });
        }

        function cleanupModal(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }
        function renderRefreshModal(type) {
            cleanupModal(type === 'import' ? 'import-modal-wrap' : 'settings-modal-wrap');
            if (type === 'import') renderImportModal();
            else renderSettingsModal();
        }

        function saveInlineEdit(el, keepEditing) {
            const taskId = parseInt(el.dataset.editTask, 10);
            const field = el.dataset.editField;
            const value = el.value;
            const updates = { [field]: value };
            if (field === 'svId') updates.guideId = deriveGuideId(value);
            dispatch({ type: 'UPDATE_TASK', payload: { id: taskId, updates } });
            if (!keepEditing) { editing = null; }
        }

        function handleDropdownOpen(anchor, ddType, tid) {
            let items = '';
            if (ddType === 'status') {
                const task = getTasks().find(t => t.id === tid);
                ALL_STATUSES.forEach(s => {
                    const c = STATUS_CFG[s];
                    const sel = task && task.status === s ? 'selected' : '';
                    const disabled = s === 'in_progress' && task && !task.assignee ? ' style="opacity:.4;pointer-events:none" title="Kräver tilldelad person"' : '';
                    items += `<div class="gp-dropdown-item ${sel}" data-dd-action="set-status" data-val="${s}" data-tid="${tid}"${disabled}>
                        <span class="gp-status-dot" style="background:${c.dot}"></span>${c.label}</div>`;
                });
            } else if (ddType === 'assignee') {
                const assignees = getAssignees();
                const task = getTasks().find(t => t.id === tid);
                assignees.forEach(a => {
                    const sel = task && task.assignee === a ? 'selected' : '';
                    const ini = a.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
                    items += `<div class="gp-dropdown-item ${sel}" data-dd-action="set-assignee" data-val="${esc(a)}" data-tid="${tid}">
                        <span class="gp-avatar" style="width:22px;height:22px;font-size:.65rem">${esc(ini)}</span>${esc(a)}</div>`;
                });
                items += `<div class="gp-dropdown-sep"></div>`;
                items += `<div class="gp-dropdown-item" data-dd-action="edit-assignee" data-tid="${tid}">✏ Ange namn...</div>`;
                if (task && task.assignee) {
                    items += `<div class="gp-dropdown-item" data-dd-action="clear-assignee" data-tid="${tid}" style="color:var(--ic-danger)">✕ Ta bort tilldelning</div>`;
                }
            } else if (ddType === 'status-filter') {
                const active = state._ui.filters.statuses;
                ALL_STATUSES.forEach(s => {
                    const c = STATUS_CFG[s];
                    const on = active.includes(s);
                    items += `<div class="gp-dropdown-item" data-dd-action="toggle-status-filter" data-val="${s}">
                        <span class="gp-dd-check ${on?'on':''}">${on?'✓':''}</span>
                        <span class="gp-status-dot" style="background:${c.dot}"></span>${c.label}</div>`;
                });
            } else if (ddType === 'assignee-filter') {
                const all = getAssignees();
                const active = state._ui.filters.assignees;
                all.forEach(a => {
                    const on = active.includes(a);
                    items += `<div class="gp-dropdown-item" data-dd-action="toggle-assignee-filter" data-val="${esc(a)}">
                        <span class="gp-dd-check ${on?'on':''}">${on?'✓':''}</span>${esc(a)}</div>`;
                });
                if (!all.length) items += `<div class="gp-dropdown-item" style="color:#9ca3af">Inga tilldelade ännu</div>`;
            }
            renderDropdown(anchor, items, ddType);
        }

        function handleDropdownSelect(item) {
            const action = item.dataset.ddAction;
            const val = item.dataset.val;
            const tid = item.dataset.tid != null ? parseInt(item.dataset.tid, 10) : undefined;
            switch (action) {
                case 'set-status':
                    dispatch({ type: 'UPDATE_TASK', payload: { id: tid, updates: { status: val } } });
                    closeDropdowns();
                    break;
                case 'set-assignee':
                    dispatch({ type: 'UPDATE_TASK', payload: { id: tid, updates: { assignee: val } } });
                    closeDropdowns();
                    break;
                case 'edit-assignee':
                    closeDropdowns();
                    editing = { taskId: tid, field: 'assignee' };
                    render();
                    break;
                case 'clear-assignee':
                    dispatch({ type: 'UPDATE_TASK', payload: { id: tid, updates: { assignee: '' } } });
                    closeDropdowns();
                    break;
                case 'toggle-status-filter': {
                    const cur = [...state._ui.filters.statuses];
                    const idx = cur.indexOf(val);
                    if (idx >= 0) cur.splice(idx, 1); else cur.push(val);
                    dispatch({ type: 'SET_FILTER', payload: { statuses: cur } });
                    // Re-open dropdown
                    setTimeout(() => {
                        const btn = document.querySelector('[data-dd="status-filter"]');
                        if (btn) handleDropdownOpen(btn, 'status-filter');
                    }, 50);
                    break;
                }
                case 'toggle-assignee-filter': {
                    const cur = [...state._ui.filters.assignees];
                    const idx = cur.indexOf(val);
                    if (idx >= 0) cur.splice(idx, 1); else cur.push(val);
                    dispatch({ type: 'SET_FILTER', payload: { assignees: cur } });
                    setTimeout(() => {
                        const btn = document.querySelector('[data-dd="assignee-filter"]');
                        if (btn) handleDropdownOpen(btn, 'assignee-filter');
                    }, 50);
                    break;
                }
            }
        }

        function handleAddFormSubmit() {
            const svId = (document.getElementById('af-svid')?.value || '').trim();
            const namn = (document.getElementById('af-namn')?.value || '').trim();
            const desc = (document.getElementById('af-desc')?.value || '').trim();
            const typeEl = document.querySelector('input[name="af-type"]:checked');
            const taskType = typeEl ? typeEl.value : 'update';

            if (!svId && !namn) { showToast('Ange minst Guide-ID eller namn', 'error'); return; }

            const guideId = deriveGuideId(svId);
            const groupTasks = getTasks().filter(t => t.guideId === guideId);
            const maxSort = groupTasks.length ? Math.max(...groupTasks.map(t => t.sortOrder)) + 1 : 0;

            const task = {
                id: uid(), guideId, svId, namn, description: desc, enId: '', noId: '',
                taskType, status: 'not_started', assignee: '',
                createdAt: nowISO(), updatedAt: nowISO(), sortOrder: maxSort,
                startedAt: null, completedAt: null, completionTime: null, lockedFields: []
            };
            dispatch({ type: 'IMPORT_TASKS', payload: { newTasks: [task], mode: 'merge' } });
            addFormOpen = false;
            showToast('Guide tillagd', 'success');
        }

        function handleAddStep(guideId) {
            const groupTasks = getTasks().filter(t => t.guideId === guideId);
            const maxSort = groupTasks.length ? Math.max(...groupTasks.map(t => t.sortOrder)) + 1 : 0;
            const svId = guideId ? guideId + '-' + String(maxSort + 1).padStart(2, '0') : '';
            const task = {
                id: uid(), guideId, svId, namn: '', description: '', enId: '', noId: '',
                taskType: 'update', status: 'not_started', assignee: '',
                createdAt: nowISO(), updatedAt: nowISO(), sortOrder: maxSort,
                startedAt: null, completedAt: null, completionTime: null, lockedFields: []
            };
            dispatch({ type: 'ADD_TASK', payload: task });
            showToast('Steg tillagt', 'info');
        }

        async function handleClipboardImport() {
            try {
                const text = await navigator.clipboard.readText();
                if (!text.trim()) { showToast('Urklipp är tomt', 'error'); return; }
                importPreview = text.includes('\t') ? parseTSV(text) : parseCSVText(text);
                renderRefreshModal('import');
            } catch (e) { showToast('Kunde inte läsa urklipp. Kontrollera behörigheter.', 'error'); }
        }

        function handleFileImport(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const text = e.target.result;
                const ext = file.name.split('.').pop().toLowerCase();
                importPreview = (ext === 'tsv' || ext === 'txt') ? parseTSV(text) : parseCSVText(text);
                renderRefreshModal('import');
            };
            reader.readAsText(file, 'UTF-8');
        }

        function handleDoImport() {
            if (!importPreview || !importPreview.rows.length) return;
            const tasks = importRowsToTasks(importPreview.rows);
            dispatch({ type: 'IMPORT_TASKS', payload: { newTasks: tasks, mode: importMode } });
            importPreview = null;
            cleanupModal('import-modal-wrap');
            dispatch({ type: 'SET_IMPORT_MODAL', payload: false });
            showToast(`${tasks.length} uppgifter importerade`, 'success');
        }

        // ================================================================
        //  INITIALIZATION
        // ================================================================
        async function init() {
            state = await loadState();
            setupEvents();
            render();
            if (typeof ICUtils !== 'undefined' && ICUtils.notifyReady) {
                ICUtils.notifyReady('guide-planner');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => init());
        } else {
            init();
        }

    })();
    </script>
</body>
</html>
