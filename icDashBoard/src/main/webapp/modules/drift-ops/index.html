<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drift & Övervakning</title>
    <link rel="stylesheet" href="../../shared/ic-styles.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: var(--ic-gray-50, #f8f9fa);
        }

        .do-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .do-tabs {
            display: flex;
            border-bottom: 2px solid var(--ic-gray-200, #e9ecef);
            background: #fff;
            flex-shrink: 0;
            padding: 0 8px;
            gap: 2px;
        }

        .do-tab {
            padding: 10px 18px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: var(--ic-gray-600, #6c757d);
            transition: color 0.2s, border-bottom-color 0.2s;
            white-space: nowrap;
        }

        .do-tab:hover {
            color: var(--ic-primary, #4361ee);
        }

        .do-tab.active {
            color: var(--ic-primary, #4361ee);
            border-bottom-color: var(--ic-primary, #4361ee);
        }

        .do-content {
            flex: 1;
            position: relative;
            overflow: hidden;
        }

        .do-frame {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .do-frame.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="do-container">
        <div class="do-tabs" role="tablist">
            <button class="do-tab active" role="tab" data-tab="0">Infrastruktur</button>
            <button class="do-tab" role="tab" data-tab="1">Servrar</button>
            <button class="do-tab" role="tab" data-tab="2">Certifikat</button>
            <button class="do-tab" role="tab" data-tab="3">Backup</button>
            <button class="do-tab" role="tab" data-tab="4">CloudGuard</button>
            <button class="do-tab" role="tab" data-tab="5">Incidenter</button>
        </div>
        <div class="do-content">
            <iframe class="do-frame" id="frame-0"></iframe>
            <iframe class="do-frame" id="frame-1"></iframe>
            <iframe class="do-frame" id="frame-2"></iframe>
            <iframe class="do-frame" id="frame-3"></iframe>
            <iframe class="do-frame" id="frame-4"></iframe>
            <iframe class="do-frame" id="frame-5"></iframe>
        </div>
    </div>

    <script>
    (function() {
        const TABS = [
            { src: '../drift-monitor/index.html',      label: 'Infrastruktur' },
            { src: '../server-list/index.html',         label: 'Servrar' },
            { src: '../certificates/index.html',        label: 'Certifikat' },
            { src: '../backup-status/index.html',       label: 'Backup' },
            { src: '../cloudguard-monitor/index.html',  label: 'CloudGuard' },
            { src: '../incidents/index.html',           label: 'Incidenter' }
        ];

        const STORAGE_KEY = 'drift-ops-active-tab';
        const loaded = new Set();
        const tabs = document.querySelectorAll('.do-tab');
        const frames = document.querySelectorAll('.do-frame');

        function activate(index) {
            tabs.forEach(t => t.classList.remove('active'));
            frames.forEach(f => f.classList.remove('active'));

            tabs[index].classList.add('active');
            frames[index].classList.add('active');

            // Lazy-load iframe on first activation
            if (!loaded.has(index)) {
                frames[index].src = TABS[index].src;
                loaded.add(index);
            }

            try { localStorage.setItem(STORAGE_KEY, index); } catch(e) {}
        }

        tabs.forEach(tab => {
            tab.addEventListener('click', () => activate(parseInt(tab.dataset.tab)));
        });

        // Restore last active tab or default to 0
        let initial = 0;
        try {
            const saved = parseInt(localStorage.getItem(STORAGE_KEY));
            if (saved >= 0 && saved < TABS.length) initial = saved;
        } catch(e) {}

        activate(initial);

        // Notify parent dashboard that module is ready
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'module-ready', module: 'drift-ops' }, window.location.origin);
        }
    })();
    </script>
</body>
</html>
